name: CI

on:
  push:
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check tracked runtime artifacts
        run: |
          forbidden="$(git ls-files | grep -E '(^|/)(models\.tar\.gz|.*\.db|.*\.db-journal|.*\.db-wal|.*\.db-shm|.*\.joblib|.*\.pkl|.*\.pickle|backend/ml/models/)' || true)"
          if [ -n "$forbidden" ]; then
            echo "Tracked runtime artifacts detected:"
            echo "$forbidden"
            exit 1
          fi

      - name: Compile backend
        run: python -m compileall backend

      - name: Run backend tests
        run: python -m unittest discover -s tests -v

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
